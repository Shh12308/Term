services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - db
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://neondb_owner:npg_yRAzUYFu8cB1@ep-blue-sunset-aha0p3oy-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omevo
    ports:
      - "5432:5432"
